spring.application.name=be

# GitLab API configuration
gitlab.api.url=${GITLAB_API_URL:https://gitlab.com/api/v4}
gitlab.api.private-token=${GITLAB_API_PRIVATE_TOKEN:}
gitlab.webhook.secret=${GITLAB_WEBHOOK_SECRET:}

# Report storage configuration
# Path where reports will be stored (absolute or relative)
app.report.storage.location=${APP_REPORT_STORAGE_LOCATION:./reports}

# Ollama AI configuration
spring.ai.ollama.chat.options.model=qwen2.5-coder:7b-instruct
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.chat.options.num-ctx=32768
spring.ai.ollama.chat.options.top-p=0.8



# spring.ai.vectorstore.chroma.client.host=http://localhost
# spring.ai.vectorstore.chroma.client.port=8000
# spring.ai.vectorstore.chroma.initialize-schema=true
# spring.ai.vectorstore.chroma.collection-name=code-review-feedback

# spring.ai.ollama.embedding.options.model=nomic-embed-text



# H2 database configuration
spring.datasource.url=jdbc:h2:file:./data/branchdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.jackson.property-naming-strategy=SNAKE_CASE

# Allow local Ollama summary generation to complete before Spring times out async requests.
spring.mvc.async.request-timeout=300000




