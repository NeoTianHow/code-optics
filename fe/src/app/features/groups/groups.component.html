<div class="container">
  <!-- Breadcrumbs Section -->
  <div class="breadcrumb-container">
    <app-breadcrumb [items]="breadcrumbs"></app-breadcrumb>
  </div>

  <!-- Page Title -->
  <h1 class="page-title">Parent Group Overview</h1>
  <div *ngIf="!isLoading && error" class="error-banner">
    <div class="error-content">
      <img src="/icons/error.png" alt="Error" class="icon" />
      <span>{{ error }}</span>
    </div>
  </div>

  <!-- Search Section -->
  <div class="search-section">
    <mat-form-field class="group-filter-input" appearance="outline">
      <input
        matInput
        [formControl]="searchControl"
        placeholder="Search or filter parent groups..."
        (keyup)="onSearchKeyup($event)"
      />
      <div matSuffix class="search-icon-container">
        <img
          src="/icons/search.png"
          alt="Search"
          (click)="onSearch()"
          class="icon"
        />
      </div>
    </mat-form-field>
  </div>

  <div class="table-container">
    <!-- Loading Overlay -->
    <div *ngIf="isLoading" class="table-overlay">
      <mat-spinner [diameter]="40"></mat-spinner>
    </div>

    <!-- No Records Message -->
    <div
      *ngIf="!isLoading && (!dataSource.data || dataSource.data.length === 0)"
      class="table-overlay"
    >
      <div class="no-records-message">No groups found</div>
    </div>

    <!-- Table -->
    <table mat-table [dataSource]="isLoading ? [] : dataSource">
      <!-- Checkbox Column -->
      <ng-container matColumnDef="select">
        <th mat-header-cell *matHeaderCellDef>
          <mat-checkbox
            class="table-checkbox"
            (change)="$event ? toggleAllRows() : null"
            [checked]="selection.hasValue() && isAllSelected()"
            [indeterminate]="selection.hasValue() && !isAllSelected()"
            [aria-label]="checkboxLabel()"
          >
          </mat-checkbox>
        </th>
        <td mat-cell *matCellDef="let row">
          <mat-checkbox
            class="table-checkbox"
            (click)="$event.stopPropagation()"
            (change)="$event ? selection.toggle(row) : null"
            [checked]="selection.isSelected(row)"
            [aria-label]="checkboxLabel(row)"
          >
          </mat-checkbox>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Parent Group</th>
        <td mat-cell *matCellDef="let element">
          <a
            href="{{ element.web_url }}"
            target="_blank"
            rel="noopener noreferrer"
          >
            {{ element.name }}
          </a>
        </td>
      </ng-container>
      <!-- Subgroups Count Column -->
      <ng-container matColumnDef="subgroupCount">
        <th mat-header-cell *matHeaderCellDef>Total Subgroups</th>
        <td mat-cell *matCellDef="let element">{{ element.subgroupCount }}</td>
      </ng-container>

      <!-- Last Activity Column -->
      <ng-container matColumnDef="lastActivity">
        <th mat-header-cell *matHeaderCellDef>Last Updated Subgroup</th>
        <td mat-cell *matCellDef="let element">
          <ng-container
            *ngIf="
              element.mostRecentSubGroupName && element.lastActivityAt;
              else noActivity
            "
          >
            {{ element.mostRecentSubGroupName }} ({{ element.lastActivityAt }})
          </ng-container>
          <ng-template #noActivity> - </ng-template>
        </td>
      </ng-container>

      <!-- Action Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let element">
          <button
            mat-flat-button
            color="primary"
            (click)="onViewSubgroups(element)"
          >
            <div class="button-content">
              <span>View Subgroups</span>
            </div>
          </button>
        </td>
      </ng-container>

      <!-- Regular Table Row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns"
        class="summary-row"
      ></tr>
    </table>

    <!-- Paginator -->
    <mat-paginator
      *ngIf="!isLoading"
      [length]="totalItems"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      [pageIndex]="pageIndex"
      (page)="handlePageEvent($event)"
      showFirstLastButtons
      aria-label="Select page of branches"
    >
    </mat-paginator>
  </div>
</div>
